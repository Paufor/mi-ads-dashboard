const GC='rgba(255,255,255,0.05)',TC='#555',TS={fill:TC,fontSize:10}
const TT={contentStyle:{background:'#1a1a1a',border:'0.5px solid #333',borderRadius:6,fontSize:12}}

function rc(r){if(r==null)return'#555';if(r>=10)return'#4caf82';if(r>=5)return'#f0a830';return'#e05a5a'}

function KPI({label,value,sub,sc}){
  const c=sc==='good'?'#4caf82':sc==='bad'?'#e05a5a':sc==='ac'?'#8d60ca':'#999'
  return(
    <div style={{background:'#161616',border:'0.5px solid rgba(255,255,255,0.07)',borderRadius:10,padding:'14px 16px'}}>

      {sub&&<div style={{fontSize:11,marginTop:4,color:c}}>{sub}</div>}
    </div>
  )
}

function Card({title,children,mb=14}){

}

/* ═══════════════════════════════════
   CAMPAIGNS
   ═══════════════════════════════════ */
function Campaigns(){
  const [sk,setSk]=React.useState('spend')
  const [sd,setSd]=React.useState(-1)
  const cols=[{k:'name',l:'Campaña'},{k:'status',l:'Estado'},{k:'spend',l:'Gasto'},{k:'imp',l:'Impr.'},{k:'ctr',l:'CTR'},{k:'cpc',l:'CPC'},{k:'purchases',l:'Compras'},{k:'roas',l:'ROAS'}]
  const sorted=[...CAMPAIGNS].sort((a,b)=>{const av=a[sk]??-Infinity,bv=b[sk]??-Infinity;return typeof av==='string'?av.localeCompare(bv)*sd:(av-bv)*sd})
  function hs(k){if(k===sk)setSd(d=>d*-1);else{setSk(k);setSd(-1)}}
  return(
    <div style={{background:'#161616',border:'0.5px solid rgba(255,255,255,0.07)',borderRadius:10,overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,whiteSpace:'nowrap'}}>
        <thead><tr>{cols.map(c=>(
          <th key={c.k} onClick={()=>hs(c.k)} style={{textAlign:'left',padding:'10px 12px',color:'#555',fontWeight:400,fontSize:11,textTransform:'uppercase',letterSpacing:'.4px',borderBottom:'0.5px solid rgba(255,255,255,0.07)',cursor:'pointer',userSelect:'none'}}>
            {c.l} <span style={{opacity:.4}}>{sk===c.k?(sd===1?'↑':'↓'):'↕'}</span>
          </th>
        ))}</tr></thead>
        <tbody>{sorted.map((c,i)=>(
          <tr key={i}>
            <td style={{padding:'10px 12px',borderBottom:'0.5px solid rgba(255,255,255,0.04)',color:'#e0e0e0',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</td>
            <td style={{padding:'10px 12px',borderBottom:'0.5px solid rgba(255,255,255,0.04)'}}><span style={c.status==='ACTIVE'?{background:'rgba(76,175,130,0.15)',color:'#4caf82',borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:500}:{background:'#1a1a1a',color:'#555',borderRadius:4,padding:'2px 8px',fontSize:11}}>{c.status==='ACTIVE'?'Activo':'Pausado'}</span></td>
            {['spend','imp','ctr','cpc','purchases'].map(k=>(
              <td key={k} style={{padding:'10px 12px',borderBottom:'0.5px solid rgba(255,255,255,0.04)',color:'#999'}}>
                {k==='spend'?'$'+c[k].toFixed(0):k==='imp'?c[k].toLocaleString():k==='ctr'?c[k].toFixed(2)+'%':k==='cpc'?'$'+c[k].toFixed(3):c[k]}
              </td>
            ))}
            <td style={{padding:'10px 12px',borderBottom:'0.5px solid rgba(255,255,255,0.04)',color:rc(c.roas),fontWeight:500}}>{c.roas!=null?c.roas.toFixed(2)+'x':'—'}</td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  )
}

   ═══════════════════════════════════ */
function Analytics(){
  const {BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer}=Recharts
  const funnel=[
    {label:'Impresiones',  val:ACCOUNT.impressions},
    {label:'Clics',        val:ACCOUNT.clicks},
    {label:'Landing PV',   val:ACCOUNT.landingPageViews},
    {label:'View Content', val:ACCOUNT.viewContent},
    {label:'Add to Cart',  val:ACCOUNT.addToCart},
    {label:'Init Checkout',val:ACCOUNT.initiateCheckout},
    {label:'Compras',      val:ACCOUNT.purchases},
  ]
  const maxF=funnel[0].val
  const PC=['#8d60ca','#7a4fb0','#6a40a0','#5a3090','#444','#555','#333']
  const roasData=[...CAMPAIGNS].filter(c=>c.roas!=null).sort((a,b)=>b.roas-a.roas)
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <Card title="ROAS por campaña" mb={0}>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={roasData} layout="vertical" margin={{top:4,right:16,bottom:0,left:4}}>
              <CartesianGrid stroke={GC} horizontal={false}/>
              <XAxis type="number" tick={TS} tickFormatter={v=>v+'x'}/>
              <YAxis type="category" dataKey="name" tick={{...TS,fontSize:9}} width={130} tickFormatter={n=>n.length>16?n.slice(0,16)+'…':n}/>
              <Tooltip {...TT} formatter={v=>[v.toFixed(2)+'x','ROAS']}/>
              <Bar dataKey="roas" fill="#8d60ca" radius={[0,4,4,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card title="Distribución del gasto" mb={0}>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={CAMPAIGNS} dataKey="spend" cx="50%" cy="50%" outerRadius={80} innerRadius={40}>
                {CAMPAIGNS.map((_,i)=><Cell key={i} fill={PC[i]??'#333'}/>)}
              </Pie>
              <Tooltip {...TT} formatter={(v,n)=>['$'+v.toFixed(0),n]}/>
              <Legend iconType="square" iconSize={8} wrapperStyle={{fontSize:10,color:'#888'}}/>
            </PieChart>
          </ResponsiveContainer>
        </Card>
      </div>
      <div style={{marginTop:14}}>
        <Card title="Embudo de conversión (30 días)">
          {funnel.map((f,i)=>{
            const pct=(f.val/maxF*100).toFixed(1)
            const prev=i>0?funnel[i-1].val:f.val
            const drop=i>0?((1-f.val/prev)*100).toFixed(0):null
            return(
              <div key={f.label} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{fontSize:12,color:'#999',width:130,flexShrink:0}}>{f.label}</div>
                <div style={{flex:1,background:'#1a1a1a',borderRadius:3,height:18,overflow:'hidden'}}>
                  <div style={{height:'100%',background:'#8d60ca',borderRadius:3,width:pct+'%'}}/>
                </div>
                <div style={{fontSize:12,color:'#e0e0e0',minWidth:60,textAlign:'right'}}>{f.val.toLocaleString()}</div>
                {drop&&<div style={{fontSize:11,color:'#e05a5a',minWidth:40,textAlign:'right'}}>-{drop}%</div>}
              </div>
            )
          })}
        </Card>
        <Card title="CTR vs CPC por día">
          <ResponsiveContainer width="100%" height={170}>
            <LineChart data={DAILY} margin={{top:4,right:16,bottom:0,left:-10}}>
              <CartesianGrid stroke={GC} vertical={false}/>
              <XAxis dataKey="d" tick={TS} interval={3}/>
              <YAxis yAxisId="l" tick={TS} tickFormatter={v=>v.toFixed(1)+'%'}/>
              <YAxis yAxisId="r" orientation="right" tick={TS} tickFormatter={v=>'$'+v.toFixed(2)}/>
              <Tooltip {...TT} formatter={(v,n)=>n==='CTR'?[v.toFixed(2)+'%','CTR']:['$'+v.toFixed(3),'CPC']}/>
              <Legend iconType="square" iconSize={8} wrapperStyle={{fontSize:11,color:'#888'}}/>
              <Line yAxisId="l" type="monotone" dataKey="ctr" name="CTR" stroke="#8d60ca" strokeWidth={2} dot={false}/>
              <Line yAxisId="r" type="monotone" dataKey="cpc" name="CPC" stroke="#4caf82" strokeWidth={2} dot={false} strokeDasharray="4 2"/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>
  )
}

function Creatives(){
  const [sk,setSk]=React.useState('roas')
  const [onlyR,setOR]=React.useState(false)
  let list=[...ADS]
  if(onlyR)list=list.filter(a=>a.roas!=null)
  list.sort((a,b)=>(b[sk]??-1)-(a[sk]??-1))
  const mr=Math.max(...ADS.filter(a=>a.roas).map(a=>a.roas))
  const bs=(a)=>({background:a?'rgba(141,96,202,0.13)':'#161616',border:a?'0.5px solid #8d60ca':'0.5px solid rgba(255,255,255,0.07)',borderRadius:6,padding:'5px 10px',fontSize:12,color:a?'#8d60ca':'#999',cursor:'pointer'})
  return(
    <div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
        {['roas','spend','ctr','purchases','imp'].map(k=>(
          <button key={k} style={bs(sk===k)} onClick={()=>setSk(k)}>{k==='imp'?'Impr.':k.charAt(0).toUpperCase()+k.slice(1)}</button>
        ))}
        <button style={bs(onlyR)} onClick={()=>setOR(r=>!r)}>Solo con ROAS</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {list.map((ad,i)=>(
          <div key={i} style={{background:'#161616',border:'0.5px solid rgba(255,255,255,0.07)',borderRadius:10,padding:14}}>
            <div style={{fontSize:12,fontWeight:500,color:'#e0e0e0',marginBottom:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={ad.name}>{ad.name}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>
              {[['Gasto','$'+ad.spend.toFixed(0)],['Impr.',ad.imp.toLocaleString()],['CTR',ad.ctr.toFixed(2)+'%'],['Compras',ad.purchases]].map(([l,v])=>(
                <div key={l}><div style={{fontSize:10,color:'#555'}}>{l}</div><div style={{fontSize:12,color:'#aaa',fontWeight:500}}>{v}</div></div>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
              <span style={{fontSize:11,color:'#555'}}>ROAS</span>
              <span style={{fontSize:14,fontWeight:500,color:rc(ad.roas)}}>{ad.roas!=null?ad.roas.toFixed(2)+'x':'—'}</span>
            </div>
            <div style={{background:'#222',borderRadius:2,height:3,overflow:'hidden'}}>
              <div style={{height:'100%',background:rc(ad.roas),borderRadius:2,width:ad.roas?`${(ad.roas/mr*100).toFixed(1)}%`:'0%'}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  )
}

/* ═══════════════════════════════════
   BUDGET
   ═══════════════════════════════════ */
function Budget(){
  const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer}=Recharts
  const pac=[
    {name:'SB Scale 1',          spend:147.38,status:'ACTIVE'},
    {name:'Live Series Prospect',spend:148.86,status:'ACTIVE'},
    {name:'SB Prospecting',      spend:302.03,status:'ACTIVE'},
    {name:'Giveaway Leads',      spend:71.96, status:'PAUSED'},
    {name:'Giveaway Eng (no flw)',spend:98.92,status:'PAUSED'},
    {name:'Giveaway Eng (flw)',  spend:37.98, status:'PAUSED'},
    {name:'LS Manual Test',      spend:138.18,status:'PAUSED'},
  ]
  const mx=Math.max(...pac.map(p=>p.spend))
  const spd=DAILY.filter(d=>d.spend>0).length
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
        <KPI label="Total gastado"      value={`$${ACCOUNT.spend.toFixed(0)}`}         sub="30 días" sc="ac"/>
        <KPI label="Gasto diario prom." value={`$${(ACCOUNT.spend/spd).toFixed(2)}`}   sub={`${spd} días con gasto`}/>
        <KPI label="Revenue generado"   value={`$${ACCOUNT.revenue.toLocaleString()}`} sub={`ROAS: ${ACCOUNT.roas.toFixed(2)}x`} sc="good"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
        {pac.map((p,i)=>(
          <div key={i} style={{background:'#161616',border:'0.5px solid rgba(255,255,255,0.07)',borderRadius:10,padding:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4,gap:8}}>
              <span style={{fontSize:11,color:'#999',flex:1,lineHeight:1.4}}>{p.name}</span>
              <span style={p.status==='ACTIVE'?{background:'rgba(76,175,130,0.15)',color:'#4caf82',borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:500}:{background:'#1a1a1a',color:'#555',borderRadius:4,padding:'2px 8px',fontSize:11}}>{p.status==='ACTIVE'?'Activo':'Pausado'}</span>
            </div>
            <div style={{fontSize:22,fontWeight:500,color:'#e0e0e0',marginBottom:8}}>${p.spend.toFixed(0)}</div>
            <div style={{background:'#222',borderRadius:3,height:6,overflow:'hidden',marginBottom:6}}>
              <div style={{height:'100%',borderRadius:3,background:p.status==='ACTIVE'?'#8d60ca':'#444',width:`${(p.spend/mx*100).toFixed(1)}%`}}/>
            </div>
            <div style={{fontSize:10,color:'#555'}}>{p.status==='ACTIVE'?'Campaña activa':'Campaña pausada'}</div>
          </div>
        ))}
      </div>
      <Card title="Gasto acumulado por campaña">
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={[...pac].sort((a,b)=>b.spend-a.spend)} layout="vertical" margin={{top:4,right:16,bottom:0,left:4}}>
            <CartesianGrid stroke={GC} horizontal={false}/>
            <XAxis type="number" tick={TS} tickFormatter={v=>'$'+v}/>
            <YAxis type="category" dataKey="name" tick={{...TS,fontSize:10}} width={160}/>
            <Tooltip {...TT} formatter={v=>['$'+v,'Gasto']}/>
            <Bar dataKey="spend" fill="#8d60ca" radius={[0,4,4,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
    </div>
  )
}
